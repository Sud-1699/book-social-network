<h2>My return books</h2>
<div class="alert" *ngIf="message" [class.alert-danger]="alertLevel === 'error'" [class.alert-success]="alertLevel === 'success'">
    {{ message }}
</div>
<div>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">TItle</th>
                <th scope="col">Author</th>
                <th scope="col">ISBN</th>
                <th scope="col">Rate</th>
                <th scope="col">
                    <i class="fas fa-cogs"></i>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let book of returnedBooks.content; let i = index">
                <th scope="row">
                    {{ i + 1 }}
                </th>
                <td>
                    {{ book.title }}
                </td>
                <td>
                    {{ book.authorName }}
                </td>
                <td>
                    {{ book.isbn }}
                </td>
                <td>
                    <i class="fas fa-star text-warning"></i>
                    {{ book.rate }}
                </td>
                <td>
                    <div class="d-flex gap-2">
                        <i class="fa-regular fa-paper-plane text-primary" *ngIf="book.returned"></i>
                        <i class="fa-solid fa-paper-plane text-success" *ngIf="!book.returned"></i>
                        <i class="fa-solid fa-circle-check" [class.text-success]="book.returnApprove" (click)="approveBookReturn(book)"></i>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center mt-3">
        <nav aria-label="page nav">
            <ul class="pagination">
                <li class="page-item">
                    <a (click)="goToFirstPage()" href="javascript:void(0)" class="page-link" aria-label="first" [class.disabled]="page === 0">
                        <i class="fa-solid fa-angles-left"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToPreviousPage()" href="javascript:void(0)" class="page-link" aria-label="previous" [class.disabled]="page === 0">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                </li>
                <li class="page-item" *ngFor="let _ of [].constructor(returnedBooks.totalPages); let pageIndex = index">
                    <a (click)="goToPage(pageIndex)" href="javascript:void(0)" class="page-link" aria-label="current">
                        {{ pageIndex + 1 }}
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToNextPage()" href="javascript:void(0)" class="page-link" aria-label="next" [class.disabled]="isLastPage">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToLastPage()" href="javascript:void(0)" class="page-link" aria-label="last" [class.disabled]="isLastPage">
                        <i class="fa-solid fa-angles-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
